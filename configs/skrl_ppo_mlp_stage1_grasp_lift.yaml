# Stage 1 PPO (MLP, vector obs): learn approach -> grasp proxy -> lift.

seed: 42

models:
  separate: false
  policy:
    class: GaussianMixin
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 512, 256]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 512, 256]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: PPO
  rollouts: 32
  learning_epochs: 5
  mini_batches: 8
  discount_factor: 0.99
  gae_lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.15
  value_clip: 0.2
  entropy_loss_scale: 0.02
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: false
  experiment:
    directory: "sg2_rl_stage1_grasp_lift_mlp_ppo"
    experiment_name: ""
    # SKRL SequentialTrainer: one trainer timestep = one env.step() across all parallel envs.
    # TensorBoard + our wandb.log only run when (trainer_step+1) is a multiple of write_interval.
    # Keep 32 for dense curves; very large values (e.g. 1000) => only ~1 wandb point per 1000 steps.
    # Checkpoint every 5,000 trainer steps (see trainer.timesteps).
    write_interval: 32
    checkpoint_interval: 5000

trainer:
  class: SequentialTrainer
  # Total trainer steps (outer loop). With e.g. torchrun --nproc_per_node=3 and 10,922 envs/GPU → 32,766 envs total.
  timesteps: 500000
  environment_info: log

sg2rl:
  lr_schedule:
    enabled: true
    base_lr: 3.0e-04
    decay_start: 200000
    slowdown_factor: 4.0
    min_scale: 0.75
